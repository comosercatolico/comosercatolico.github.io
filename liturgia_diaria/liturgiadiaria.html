<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liturgia Diária • Lux Fidei</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="liturgia.css">

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<header>
  <h1>Lux Fidei</h1>
  <p style="opacity:0.8">Luz da Fé Católica</p>
</header>

<!-- MENU PRINCIPAL -->
<nav class="menu">
  <a href="../index.html" class="menu-item">Início</a>
  <a href="liturgiadiaria.html" class="menu-item active">Liturgia Diária</a>
  <a href="../santos/santos.html" class="menu-item">Santos</a>
  <a href="../biblioteca/biblioteca.html" class="menu-item">Biblioteca</a>
  <a href="../estudos/estudos.html" class="menu-item">Estudos</a>
  <a href="../jogos/jogos.html" class="menu-item">Jogos</a>
  <span class="menu-indicator"></span>
</nav>

<!-- CONTEÚDO -->
<main class="liturgia-master-container">

  <!-- HEADER BONITO -->
  <section class="liturgia-super-header">
    
    <span class="badge-liturgico" id="liturgia-badge">TEMPO LITÚRGICO</span>

    <h1 id="liturgia-titulo"></h1>
    <p id="liturgia-data"></p>

    <!-- TOOLBAR FUTURA -->
    <div class="reading-toolbar">
      <span>📖 Liturgia do Dia</span>
    </div>

  </section>

  <!-- GRID -->
  <section class="liturgia-layout-grid">
  
  <aside class="liturgia-sidebar">
      <div class="santo-do-dia-mini">
          <small>Sugestão</small>
          <p><strong>Meditação Diária</strong></p>
          <p style="font-size: 0.9rem; color: var(--text-soft)">Reserve 10 minutos para o silêncio após a leitura.</p>
      </div>
  </aside>

  <main id="liturgia-conteudo" class="liturgia-principal">
      <p style="text-align:center; padding: 40px; color: #999;">Carregando liturgia...</p>
  </main>

</section>

</main>

<!-- FOOTER -->
<footer>
  © 2026 – Lux Fidei
</footer>

<!-- SCRIPT -->
<script src="js/liturgia.js"></script>

<script>

/* =========================
   🚀 CARREGAR LITURGIA
========================= */

carregarLiturgia();

/* =========================
   MENU ANIMADO
========================= */

const indicator = document.querySelector(".menu-indicator");
const items = document.querySelectorAll(".menu-item");

function updateIndicator(el){
  indicator.style.width = el.offsetWidth + "px";
  indicator.style.left = el.offsetLeft + "px";
}

items.forEach(item => {
  item.addEventListener("click", function(){
    items.forEach(i => i.classList.remove("active"));
    this.classList.add("active");
    updateIndicator(this);
  });
});

window.onload = () => {
  const active = document.querySelector(".menu-item.active");
  if(active){
    updateIndicator(active);
  }
};

</script>
</body>
</html>
