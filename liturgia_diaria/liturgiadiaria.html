<section class="liturgia-master-container">
    <header class="liturgia-super-header">
        <div class="header-content">
            <span id="liturgia-data" class="badge-liturgico">Carregando...</span>
            <h1 id="liturgia-titulo" class="titulo-principal">Liturgia da Palavra</h1>
            <p class="motto">"Tua palavra é lâmpada para os meus pés e luz para o meu caminho."</p>
        </div>
        
        <div class="reading-toolbar">
            <div class="tool-group">
                <button onclick="ajustarFonte(-1)" title="Diminuir fonte">A-</button>
                <button onclick="ajustarFonte(1)" title="Aumentar fonte">A+</button>
            </div>
            <div class="tool-divider"></div>
            <button class="btn-focus-mode" onclick="toggleFocusMode()">
                <i class="fas fa-expand"></i> Modo Foco
            </button>
            <button class="btn-refresh-top" onclick="carregarLiturgia(true)">
                <i class="fas fa-sync"></i>
            </button>
        </div>
    </header>

    <div class="liturgia-layout-grid">
        <aside class="liturgia-sidebar">
            <div class="santo-do-dia-mini">
                <small>Santo do Dia</small>
                <h4 id="santo-nome-liturgia">Carregando...</h4>
                <div class="mini-divider"></div>
                <p>Inspire-se na vida dos que precederam na fé.</p>
            </div>
            
            <nav class="leitura-nav">
                <a href="#primeira" class="nav-item active">I Leitura</a>
                <a href="#salmo" class="nav-item">Salmo</a>
                <a href="#segunda" class="nav-item">II Leitura</a>
                <a href="#evangelho" class="nav-item">Evangelho</a>
            </nav>
        </aside>

        <main id="liturgia-conteudo" class="liturgia-main-content">
            <div class="skeleton-wrapper">
                <div class="skeleton-line title"></div>
                <div class="skeleton-line text"></div>
                <div class="skeleton-line text"></div>
                <div class="skeleton-line text"></div>
            </div>
        </main>
    </div>

    <footer class="liturgia-super-footer">
        <div class="footer-info">
            <img src="imagens/logo-small.png" alt="Lux Fidei" class="mini-logo">
            <span>Lux Fidei • Liturgia Oficial da Igreja</span>
        </div>
        <div class="share-actions">
            <span>Compartilhar:</span>
            <button class="share-btn"><i class="fab fa-whatsapp"></i></button>
            <button class="share-btn"><i class="far fa-copy"></i></button>
        </div>
    </footer>
</section>
