<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liturgia Diária • Lux Fidei</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="liturgia.css">

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<header>
  <h1>Lux Fidei</h1>
  <p style="opacity:0.8">Luz da Fé Católica</p>
</header>

<!-- MENU -->
<nav class="menu">

  <a href="../index.html" class="menu-item">Início</a>
  <a href="liturgiadiaria.html" class="menu-item active">Liturgia</a>
  <a href="santos.html" class="menu-item">Santos</a>
  <a href="biblioteca.html" class="menu-item">Biblioteca</a>
  <a href="estudos.html" class="menu-item">Estudos</a>
  <a href="../jogos.html" class="menu-item">Jogos</a>

  <span class="menu-indicator"></span>

</nav>

<!-- CONTEÚDO -->
<main class="liturgia-master-container">

  <!-- HEADER BONITO -->
  <section class="liturgia-super-header">
    
    <span class="badge-liturgico" id="liturgia-badge">TEMPO LITÚRGICO</span>

    <h1 id="liturgia-titulo"></h1>
    <p id="liturgia-data"></p>

    <!-- TOOLBAR FUTURA -->
    <div class="reading-toolbar">
      <span>📖 Liturgia do Dia</span>
    </div>

  </section>

  <!-- GRID -->
  <section class="liturgia-layout-grid">

    <!-- SIDEBAR -->
    <aside class="liturgia-sidebar">

      <div class="santo-do-dia-mini">
        <h3>🙏 Santo do Dia</h3>
        <p id="santo-dia">Carregando...</p>
      </div>

      <nav class="leitura-nav">
        <a href="#" class="nav-item active">Primeira Leitura</a>
        <a href="#" class="nav-item">Salmo</a>
        <a href="#" class="nav-item">Evangelho</a>
      </nav>

    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <div>

      <div id="liturgia-conteudo">

        <!-- PRIMEIRA LEITURA -->
        <section class="liturgia-card">
          <h2>Primeira Leitura</h2>
          <div class="texto-liturgico" id="primeira-leitura"></div>
        </section>

        <!-- SALMO -->
        <section class="liturgia-card">
          <h2>Salmo Responsorial</h2>
          <div class="texto-liturgico" id="salmo"></div>
        </section>

        <!-- EVANGELHO -->
        <section class="liturgia-card">
          <h2>Evangelho</h2>
          <div class="texto-liturgico" id="evangelho"></div>
        </section>

      </div>

    </div>

  </section>

</main>

<!-- FOOTER -->
<footer>
  © 2026 – Lux Fidei
</footer>

<!-- SCRIPT -->
<script src="js/liturgia.js"></script>

<script>

/* =========================
   🚀 CARREGAR LITURGIA
========================= */

carregarLiturgia();

/* =========================
   MENU ANIMADO
========================= */

const indicator = document.querySelector(".menu-indicator");
const items = document.querySelectorAll(".menu-item");

function updateIndicator(el){
  indicator.style.width = el.offsetWidth + "px";
  indicator.style.left = el.offsetLeft + "px";
}

items.forEach(item => {
  item.addEventListener("click", function(){
    items.forEach(i => i.classList.remove("active"));
    this.classList.add("active");
    updateIndicator(this);
  });
});

window.onload = () => {
  const active = document.querySelector(".menu-item.active");
  if(active){
    updateIndicator(active);
  }
};

</script>

</body>
</html>
