<style>
  .sl-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }

  .sl-intro {
    text-align: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    color: #6e6e6e;
    margin-bottom: 30px;
  }

  .sl-lista {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    list-style: none;
    padding: 0;
    margin: 0;
    border-top: 1px solid #d9d4c7;
    border-bottom: 1px solid #d9d4c7;
  }

  .sl-lista li {
    margin: 0;
    text-align: center;
  }

  /* Remove ícones/símbolos do tema */
  .sl-lista li::before,
  .sl-lista a::before,
  .sl-lista a span::before {
    content: none !important;
    display: none !important;
  }

  .sl-lista li a {
    display: block;
    text-decoration: none;
    color: #a8a8a0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 22px 10px;
    position: relative;
    transition: color 0.3s ease;
  }

  .sl-lista li a::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -1px;
    width: 0;
    height: 2px;
    background-color: #b8862a;
    transition: all 0.3s ease;
    transform: translateX(-50%);
  }

  .sl-lista li a:hover {
    color: #2b2b2b;
  }

  .sl-lista li a:hover::after,
  .sl-lista li a.ativo::after {
    width: 60%;
  }

  .sl-lista li a.ativo {
    color: #2b2b2b;
  }

  .sl-conteudo {
    padding: 40px 20px;
    font-family: Georgia, 'Times New Roman', serif;
    color: #2b2b2b;
    line-height: 1.7;
  }

  @media (max-width: 768px) {
    .sl-lista {
      grid-template-columns: repeat(2, 1fr);
    }
    .sl-lista li a {
      padding: 15px 8px;
      font-size: 11px;
      letter-spacing: 2px;
    }
  }
</style>


<script>
  // Detecta automaticamente o nome do arquivo atual e marca a aba como ativa
  (function() {
    const caminho = window.location.pathname;
    const arquivo = caminho.substring(caminho.lastIndexOf('/') + 1).replace('.html', '') || 'historia';
    
    document.querySelectorAll('.sl-lista a').forEach(link => {
      if (link.getAttribute('data-aba') === arquivo) {
        link.classList.add('ativo');
      }
    });
  })();
</script>
