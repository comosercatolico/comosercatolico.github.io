<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São João Maria Vianney - O Cura d'Ars</title>
    <link rel="stylesheet" href="https://comosercatolico.github.io/santos/presbiteros/presbiteros-dados/sao-joao-maria-vianney-dados/sao-joao-maria-vianney.css">
    <style>
        /* Ajustes para o sistema de abas */
        .sl-painel { display: none; }
        .sl-painel.ativo { display: block; }
        .sl-nav-btn { cursor: pointer; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="sl-wrap">
        <div class="sl-intro">
            <p>Pároco de Ars, confessor e padroeiro dos sacerdotes</p>
        </div>

        <nav class="sl-nav">
            <button class="sl-nav-btn ativo" data-painel="historia">História</button>
            <button class="sl-nav-btn" data-painel="ars">Ars</button>
            <button class="sl-nav-btn" data-painel="confessionario">O confessionário</button>
            <button class="sl-nav-btn" data-painel="combate">Combate Espiritual</button>
            <button class="sl-nav-btn" data-painel="espiritualidade">Espiritualidade</button>
        </nav>
        
        <div class="sl-nav-row" style="display: flex; justify-content: center; gap: 5px; margin-top: 5px;">
            <button class="sl-nav-btn" data-painel="relacoes">Relações</button>
            <button class="sl-nav-btn" data-painel="milagres">Milagres</button>
            <button class="sl-nav-btn" data-painel="morte">Morte</button>
            <button class="sl-nav-btn" data-painel="legado">Legado</button>
            <button class="sl-nav-btn" data-painel="referencias">Referências</button>
        </div>
        <div class="loading-overlay" id="loader">Carregando...</div>
        <div id="content-area">
            <!-- O conteúdo será carregado aqui dinamicamente -->
           
        </div>
    </div>

<script>
  const contentArea = document.getElementById('content-area');
  const loader = document.getElementById('loader');
  const buttons = document.querySelectorAll('.sl-nav-btn');

  const cache = {};

  function setButtonsAtivo(tabName) {
    buttons.forEach(btn => {
      const ativo = btn.getAttribute('data-painel') === tabName;
      btn.classList.toggle('ativo', ativo);
    });
  }

  function showPainelDoContent() {
    // remove ativo de todos os painéis já renderizados
    contentArea.querySelectorAll('.sl-painel').forEach(p => p.classList.remove('ativo'));

    // habilita TODOS os painéis que existem no conteúdo atual
    // (se no seu HTML existir só 1, será aquele; se existirem vários, todos aparecerão)
    const painels = contentArea.querySelectorAll('.sl-painel');
    painels.forEach(p => p.classList.add('ativo'));
  }

  async function loadTab(tabName) {
    setButtonsAtivo(tabName);

    if (cache[tabName]) {
      contentArea.innerHTML = cache[tabName];
      showPainelDoContent(); // <-- garante que .ativo vai no .sl-painel real
      return;
    }

    loader.style.display = 'flex';

    try {
      const response = await fetch(
        `https://comosercatolico.github.io/santos/presbiteros/presbiteros-dados/sao-joao-maria-vianney-dados/${tabName}.html`
      );
      if (!response.ok) throw new Error('Falha ao carregar aba');

      const html = await response.text();

      // injeta o HTML “cru” no lugar certo
      contentArea.innerHTML = html;

      // aplica ativo no(s) .sl-painel(s) que agora existem no DOM
      showPainelDoContent();

      // cacheia o HTML cru para reaproveitar depois
      cache[tabName] = html;
    } catch (error) {
      contentArea.innerHTML = `<div class="sl-alerta">Erro: ${error.message}</div>`;
    } finally {
      loader.style.display = 'none';
    }
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => loadTab(btn.getAttribute('data-painel')));
  });
console.log('tab', tabName, 'html:', html.slice(0, 200));
  loadTab('historia');
</script>
</body>
</html>
