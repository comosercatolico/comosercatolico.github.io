<script>
document.querySelectorAll('.sl-nav-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sl-nav-btn').forEach(function(b) {
      b.classList.remove('ativo');
    });
    btn.classList.add('ativo');

    var painel = btn.getAttribute('data-painel');
    document.querySelectorAll('.sl-painel').forEach(function(p) {
      p.classList.remove('ativo');
    });
    var alvo = document.getElementById('painel-' + painel);
    if (alvo) {
      alvo.classList.add('ativo');
    }
  });
});
