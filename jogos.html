<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
text-align:center;
padding:30px;
background:black;
}

h1{
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{

background:#1a1a1a;
border-radius:10px;
overflow:hidden;
transition:0.2s;

}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
display:block;
}

.card-content{
padding:15px;
}

.card h3{
margin:0 0 10px 0;
}

.card p{
font-size:14px;
color:#bbb;
}

.card a{
display:inline-block;
margin-top:10px;
padding:8px 14px;
background:#8b6f3d;
color:white;
text-decoration:none;
border-radius:6px;
}

.card a:hover{
background:#a8874b;
}

</style>
</head>

<body>

<header>
<h1>Jogos</h1>
</header>

<div class="container">

<!-- JOGO 1 -->
<div class="card">

<img src="thumb1.png">

<div class="card-content">

<h3>Santa Teresinha Idle</h3>

<p>Ajude Santa Teresinha a cultivar rosas e crescer espiritualmente.</p>

<a href="jogo.html">Jogar</a>

</div>
</div>


<!-- JOGO 2 -->
<div class="card">

<img src="thumb2.png">

<div class="card-content">

<h3>Outro jogo</h3>

<p>Descrição do jogo.</p>

<a href="outrojogo.html">Jogar</a>

</div>
</div>

</div>

</body>
</html>
