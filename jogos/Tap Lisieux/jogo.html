<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Santa Teresinha Idle</title>
<link rel="stylesheet" href="style.css">
</head>
<div id="menuTopo">

<button class="btnTop" onclick="abrirConfig()">
⚙
</button>

<button class="btnTop" onclick="voltarSite()">
⬅
</button>

</div>
<button onclick="sairBatalha()" style="position:fixed; top:20px; right:20px;">
❌ Sair
</button>
</div>
<div id="janelaConfig">

<h2>Configurações</h2>

<label>Volume</label>
<input type="range" min="0" max="1" step="0.01" id="volumeSlider">
<p id="ouroUI"></p>
<br><br>

<button onclick="fecharConfig()">Fechar</button>

</div>
<canvas id="game"></canvas>
    
<button id="btnBatalhar" onclick="iniciarBatalha()">
⚔ Batalhar
</button>

<div id="uiBatalha">
    <div id="hpInimigo"></div>
    <p id="nomeInimigo"></p>
</div>
<script>
function abrirConfig(){
document.getElementById("janelaConfig").style.display = "block";
}

function fecharConfig(){
document.getElementById("janelaConfig").style.display = "none";
}

function voltarSite(){
window.location.href = "index.html";
}
function sairBatalha(){
    emBatalha = false;
    document.getElementById("uiBatalha").style.display = "none";
}
// =====================================
// CONFIG
// =====================================

const TILE = 32;
const MAP_WIDTH = 100;
const MAP_HEIGHT = 100;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;
// =====================================
// CÂMERA
// =====================================

let camera = {
    x: MAP_WIDTH * TILE / 2 - window.innerWidth / 2,
    y: MAP_HEIGHT * TILE / 2 - window.innerHeight / 2
};

// =====================================
// CANVAS RESPONSIVO
// =====================================

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);
camera.x = MAP_WIDTH * TILE / 2 - canvas.width / 2;
camera.y = MAP_HEIGHT * TILE / 2 - canvas.height / 2;


// =====================================
// CAMERA ARRASTÁVEL SIMPLES
// =====================================

let dragging = false;
let lastX = 0;
let lastY = 0;

canvas.onmousedown = (e)=>{
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
};

canvas.onmouseup = ()=>{
    dragging = false;
};

canvas.onmouseleave = ()=>{
    dragging = false;
};

canvas.onmousemove = (e)=>{

    if(!dragging) return;

    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;

    camera.x -= dx;
    camera.y -= dy;

    lastX = e.clientX;
    lastY = e.clientY;

};
// =====================================
// IMAGENS
// =====================================

const imagens = {
    gramas: [],
    mesa: new Image(),
    cadeiraEsq: new Image(),
    cadeiraDir: new Image(),
    biblioteca: new Image(),
    estrada: new Image()
};
imagens.santaAnda = [];

let imagensParaCarregar = 0;
let imagensCarregadas = 0;

function imagemCarregada(){
    imagensCarregadas++;
}

function registrarImagem(img){
    imagensParaCarregar++;
    img.onload = imagemCarregada;
}

// gramas
for(let i=1;i<=5;i++){
    let img = new Image();
    registrarImagem(img);
    img.src = `grama${i}.jpg`;
    imagens.gramas.push(img);
}
// animação santa andando
for(let i=1;i<=9;i++){
    let img = new Image();
    registrarImagem(img);
    img.src = `tiles/trzn/anda${i}.png`;
    imagens.santaAnda.push(img);
}
// objetos
registrarImagem(imagens.mesa);
registrarImagem(imagens.cadeiraEsq);
registrarImagem(imagens.cadeiraDir);
registrarImagem(imagens.biblioteca);
registrarImagem(imagens.estrada);

imagens.estrada.src = "tiles/ti.png";
imagens.mesa.src = "mesa.png";
imagens.cadeiraEsq.src = "cadeira_esquerda.png";
imagens.cadeiraDir.src = "cadeira_direita.png";
imagens.biblioteca.src = "bb.png";


// =====================================
// MAPA
// =====================================

const mapaGrama = [];

const centroX = Math.floor(MAP_WIDTH / 2);
const centroY = Math.floor(MAP_HEIGHT / 2);

const escolaY = 12;
const largura = 1;

for(let y = 0; y < MAP_HEIGHT; y++){
    mapaGrama[y] = [];

    for(let x = 0; x < MAP_WIDTH; x++){

        let tipo = 0;

        if(y >= centroY - largura && y <= centroY + largura){
            tipo = 5;
        }

        if(x >= centroX - largura && x <= centroX + largura){
            tipo = 5;
        }

        if(y >= escolaY - largura && y <= escolaY + largura){
            tipo = 5;
        }

        if(
            x >= centroX - largura &&
            x <= centroX + largura &&
            y >= Math.min(escolaY, centroY) &&
            y <= Math.max(escolaY, centroY)
        ){
            tipo = 5;
        }

        mapaGrama[y][x] = {
            tipo: tipo,
            sombra: Math.random() * 0.03
        };
    }
}


// =====================================
// OBJETOS
// =====================================

const centroTileX = 50;
const centroTileY = 50;

const objetos = [

    {
        tipo:"biblioteca",
        tileX: 7,
        tileY: 10,
        escala: 0.9,
        layer: 0
    },

    {
        tipo:"cadeiraEsq",
        tileX: centroTileX - 1.77,
        tileY: centroTileY - 0.20,
        escala: 0.22,
        layer: 0
    },

    {
        tipo:"cadeiraDir",
        tileX: centroTileX + 1.77,
        tileY: centroTileY - 0.20,
        escala: 0.22,
        layer: 0
    },

    {
        tipo:"mesa",
        tileX: centroTileX,
        tileY: centroTileY,
        escala: 0.42,
        layer: 1
    }

];
    
// =====================================
// NPC SANTA
// =====================================

const santa = {
    tileX: 50,
    tileY: 50,
    frame: 0,
    tempo: 0,
    velocidade: 0.03,
    escala: 0.28,
    dirX: 1,
    dirY: 0
};

function atualizarSanta(){

    santa.tempo++;

    if(santa.tempo > 8){
        santa.tempo = 0;
        santa.frame++;

        if(santa.frame >= imagens.santaAnda.length){
            santa.frame = 0;
        }
    }

    santa.tileX += santa.dirX * santa.velocidade;
    santa.tileY += santa.dirY * santa.velocidade;

    const centroTileX = Math.round(santa.tileX);
    const centroTileY = Math.round(santa.tileY);

    if(
        Math.abs(santa.tileX - centroTileX) < santa.velocidade &&
        Math.abs(santa.tileY - centroTileY) < santa.velocidade
    ){

        santa.tileX = centroTileX;
        santa.tileY = centroTileY;

        const direcoes = [
            {x:1,y:0},
            {x:-1,y:0},
            {x:0,y:1},
            {x:0,y:-1}
        ];

        const possiveis = [];

        for(let d of direcoes){

            const nx = centroTileX + d.x;
            const ny = centroTileY + d.y;

            if(nx < 0 || ny < 0 || nx >= MAP_WIDTH || ny >= MAP_HEIGHT){
                continue;
            }

            if(mapaGrama[ny][nx].tipo === 5){

                // evitar voltar imediatamente
                if(d.x === -santa.dirX && d.y === -santa.dirY){
                    continue;
                }

                possiveis.push(d);
            }
        }

        if(possiveis.length > 0){

            const escolha = possiveis[Math.floor(Math.random() * possiveis.length)];

            santa.dirX = escolha.x;
            santa.dirY = escolha.y;

        }

    }

}
// =====================================
// DESENHAR CHÃO
// =====================================

function desenharChao(){

    const startX = Math.floor(camera.x / TILE);
    const startY = Math.floor(camera.y / TILE);

    const viewWidth = Math.ceil(canvas.width / TILE);
    const viewHeight = Math.ceil(canvas.height / TILE);

    const endX = startX + viewWidth + 2;
    const endY = startY + viewHeight + 2;

    for(let y=startY;y<endY;y++){
        for(let x=startX;x<endX;x++){

            if(x<0 || y<0 || x>=MAP_WIDTH || y>=MAP_HEIGHT) continue;

            const tile = mapaGrama[y][x];

            let img = (tile.tipo === 5) ? imagens.estrada : imagens.gramas[tile.tipo];

            const drawX = x*TILE - camera.x;
            const drawY = y*TILE - camera.y;

            if(img && img.complete && img.naturalWidth !== 0){

                ctx.drawImage(img, drawX, drawY, TILE, TILE);

                ctx.fillStyle = `rgba(0,0,0,${tile.sombra})`;
                ctx.fillRect(drawX, drawY, TILE, TILE);

            }else{
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(drawX, drawY, TILE, TILE);
            }
        }
    }
}


// =====================================
// DESENHAR OBJETOS
// =====================================

function desenharObjetos(){

    objetos.sort((a,b)=> {
        if(a.layer !== b.layer) return a.layer - b.layer;

        const ay = (a.tileY + 1) * TILE;
        const by = (b.tileY + 1) * TILE;
        return ay - by;
    });

    objetos.forEach(obj=>{

        const img = imagens[obj.tipo];
        if(!img.complete || img.naturalWidth === 0) return;

        const largura = img.width * obj.escala;
        const altura = img.height * obj.escala;

        const baseX = obj.tileX * TILE + TILE/2;
        const baseY = obj.tileY * TILE + TILE;

        const drawX = baseX - largura/2 - camera.x;
        const drawY = baseY - altura - camera.y;

        ctx.fillStyle = "rgba(0,0,0,0.25)";
        ctx.fillRect(
            baseX - largura/4 - camera.x,
            baseY - camera.y - 3,
            largura/2,
            5
        );

        ctx.drawImage(img, drawX, drawY, largura, altura);

    });
}
///-------------------------------///
///       DESENHAR SANTA          ///
///-------------------------------///    
function desenharSanta(){

    const img = imagens.santaAnda[Math.floor(santa.frame)];

if(!img || !img.complete || img.naturalWidth === 0){
    return;
}

    const largura = img.width * santa.escala;
    const altura = img.height * santa.escala;

    const baseX = santa.tileX * TILE + TILE/2;
    const baseY = santa.tileY * TILE + TILE;

    const drawX = baseX - largura/2 - camera.x;
    const drawY = baseY - altura - camera.y;

    ctx.save();

    if(santa.dirX < 0){
        ctx.scale(-1,1);
        ctx.drawImage(img, -(drawX + largura), drawY, largura, altura);
    }else{
        ctx.drawImage(img, drawX, drawY, largura, altura);
    }

    ctx.restore();
}

// =====================================
// SISTEMA DE BATALHA
// =====================================

let emBatalha = false;

let game = {
    ouro: 0,
    dano: 5,
    dps: 1
};

let inimigo = {
    nome: "Monstro",
    hp: 100,
    maxHp: 100,
    level: 1
};

let textos = [];

function iniciarBatalha(){
    emBatalha = true;

    inimigo.hp = inimigo.maxHp;

    document.getElementById("uiBatalha").style.display = "block";
    document.getElementById("nomeInimigo").innerText = inimigo.nome;
}

function atualizarUIBatalha(){

    if(!emBatalha) return;

    // =========================
    // BARRA DE VIDA
    // =========================
    const barra = document.getElementById("hpInimigo");

    let porcentagem = (inimigo.hp / inimigo.maxHp) * 100;

    // evitar valores quebrados
    if(porcentagem < 0) porcentagem = 0;
    if(porcentagem > 100) porcentagem = 100;

    barra.style.width = porcentagem + "%";


    // =========================
    // TEXTO INIMIGO
    // =========================
    document.getElementById("nomeInimigo").innerText = inimigo.nome;


    // =========================
    // OURO
    // =========================
    document.getElementById("ouroUI").innerText = "Ouro: " + game.ouro;
}

// clicar para dar dano (tipo Tap Titans)
canvas.addEventListener("click", ()=>{

    if(!emBatalha) return;

    darDano(game.dano);

});
    
function darDano(valor){
    inimigo.hp -= valor;
    criarTextoFlutuante(valor);

    if(inimigo.hp <= 0){
        matarInimigo();
    }
}

function matarInimigo(){
    game.ouro += inimigo.level * 5;
    proximoInimigo();
}

function proximoInimigo(){
    inimigo.level++;

    inimigo.maxHp = Math.floor(100 * Math.pow(1.25, inimigo.level));
    inimigo.hp = inimigo.maxHp;
    inimigo.nome = "Monstro Lv." + inimigo.level;
}
    


function desenharBatalha(){

    // fundo
    let grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#1e3c72");
    grad.addColorStop(1,"#2a5298");

    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // chão
    ctx.fillStyle = "#2d6a4f";
    ctx.fillRect(0,canvas.height - 150,canvas.width,150);

    // nome do inimigo
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Monstro", canvas.width/2, 100);

    // inimigo (placeholder)
    ctx.shadowBlur = 20;
    ctx.shadowColor = "red";

    ctx.fillStyle = "#ff3b3b";
    ctx.fillRect(canvas.width/2 - 60, canvas.height/2 - 60, 120, 120);

    ctx.shadowBlur = 0;

    // ✨ TEXTOS FLUTUANTES (AGORA NO LUGAR CERTO)
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";

    textos.forEach(t=>{
        ctx.fillText(t.valor, t.x, t.y);
        t.y -= 1;
        t.vida--;
    });

    textos = textos.filter(t => t.vida > 0);
}
    
function criarTextoFlutuante(valor){
    textos.push({
        x: canvas.width/2,
        y: canvas.height/2,
        valor: valor,
        vida: 60
    });
}

setInterval(()=>{
    if(emBatalha){
        darDano(game.dps);
    }
},1000);

    
// =====================================
// LOOP
// =====================================

function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(emBatalha){
        desenharBatalha();
    }else{
        atualizarSanta();
        desenharChao();
        desenharObjetos();
        desenharSanta();
    }

    atualizarUIBatalha();

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
