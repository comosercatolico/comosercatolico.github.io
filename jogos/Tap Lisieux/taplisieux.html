<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Santa Teresinha Idle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="taplisieux.css">
</head>
<body>

    <!-- MENU TOPO -->
    <div id="menuTopo">
        <button class="btnTop" onclick="abrirConfig()">⚙</button>
        <button class="btnTop" onclick="voltarSite()">⬅</button>
    </div>

    <!-- BOTÃO SAIR DA BATALHA -->
    <button onclick="sairBatalha()" style="position:fixed; top:20px; right:20px;">
        ❌ Sair
    </button>

    <!-- JANELA DE CONFIGURAÇÕES -->
    <div id="janelaConfig" style="display:none;">
        <h2>Configurações</h2>
        <label>Volume</label>
        <input type="range" min="0" max="1" step="0.01" id="volumeSlider">
        <p id="ouroUI"></p>
        <br><br>
        <button onclick="fecharConfig()">Fechar</button>
    </div>

    <!-- CANVAS DO JOGO -->
    <canvas id="game"></canvas>

    <!-- BOTÃO DE BATALHAR -->
    <button id="btnBatalhar" onclick="iniciarBatalha()">⚔ Batalhar</button>

    <!-- UI DE BATALHA -->
    <div id="uiBatalha" style="display:none;">
        <div id="hpInimigo"></div>
        <p id="nomeInimigo"></p>
    </div>

    <!-- SCRIPT DO JOGO (NO FINAL PARA GARANTIR QUE O DOM EXISTE) -->
    <script src="taplisieux.js"></script>
</body>
</html>
