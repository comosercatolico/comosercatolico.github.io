<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ano Litúrgico – Lux Fidei</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calendario.css">
</head>
<body>
    <!-- Overlay de Ruído para Textura de Pergaminho -->
    <div class="noise-overlay"></div>

    <header class="topo">
        <a href="#" class="btn-voltar">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Voltar
        </a>
        <span class="topo-titulo">Calendário Litúrgico</span>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <span class="hero-pretitle">Ecclesia Catholica</span>
                <h1>O Ciclo da Fé</h1>
                <p class="hero-sub">A jornada da alma através do Ano Litúrgico</p>
                <span class="hero-ornamento">❦</span>
            </div>
        </section>

        <section class="legenda-wrap">
            <div class="legenda">
                <div class="leg-item"><span class="leg-dot" style="background: #6a1faa;"></span> Advento</div>
                <div class="leg-item"><span class="leg-dot" style="background: #b89040;"></span> Natal</div>
                <div class="leg-item"><span class="leg-dot" style="background: #2a5898;"></span> Comum I</div>
                <div class="leg-item"><span class="leg-dot" style="background: #7a3a10;"></span> Quaresma</div>
                <div class="leg-item"><span class="leg-dot" style="background: #0e5a2e;"></span> Tríduo</div>
                <div class="leg-item"><span class="leg-dot" style="background: #1a8048;"></span> Pascal</div>
                <div class="leg-item"><span class="leg-dot" style="background: #1e4880;"></span> Comum II</div>
            </div>
        </section>

        <section class="roda-section">
            <div class="roda-container">
                <div class="roda-outer">
                    <svg id="roda-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
                        <!-- Definições de Gradientes e Filtros -->
                        <defs>
                            <filter id="f-glow-gold" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="2.5" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                            <pattern id="pat-dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
                                <circle cx="1" cy="1" r="0.5" fill="rgba(154,122,58,0.15)"/>
                            </pattern>
                            
                            <!-- Gradientes para os Tempos -->
                            <linearGradient id="g-advento" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4a148c"/><stop offset="100%" stop-color="#7b1fa2"/>
                            </linearGradient>
                            <linearGradient id="g-natal" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#b8860b"/>
                            </linearGradient>
                            <linearGradient id="g-comum1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#1565c0"/><stop offset="100%" stop-color="#1e88e5"/>
                            </linearGradient>
                            <linearGradient id="g-quaresma" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#5d4037"/><stop offset="100%" stop-color="#8d6e63"/>
                            </linearGradient>
                            <linearGradient id="g-triduo" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#1b5e20"/><stop offset="100%" stop-color="#2e7d32"/>
                            </linearGradient>
                            <linearGradient id="g-pascal" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#2e7d32"/><stop offset="100%" stop-color="#43a047"/>
                            </linearGradient>
                            <linearGradient id="g-comum2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#0d47a1"/><stop offset="100%" stop-color="#1976d2"/>
                            </linearGradient>
                        </defs>

                        <!-- Elementos de Fundo da Roda -->
                        <circle cx="300" cy="300" r="280" fill="none" stroke="rgba(154,122,58,0.1)" stroke-width="1"/>
                        <circle cx="300" cy="300" r="270" fill="none" stroke="rgba(154,122,58,0.05)" stroke-width="40"/>
                        
                        <!-- Grupo para os Arcos (Gerado via JS) -->
                        <g id="g-arcos"></g>

                        <!-- Centro da Roda -->
                        <g class="roda-centro">
                            <circle cx="300" cy="300" r="115" fill="#110d08"/>
                            <circle cx="300" cy="300" r="115" fill="url(#pat-dots)" opacity="0.6"/>
                            
                            <!-- Cruz Central -->
                            <g class="centro-cruz" transform="translate(300,300)">
                                <rect x="-2" y="-35" width="4" height="70" rx="1" fill="var(--gold-lt)" filter="url(#f-glow-gold)"/>
                                <rect x="-35" y="-2" width="70" height="4" rx="1" fill="var(--gold-lt)" filter="url(#f-glow-gold)"/>
                                <circle cx="0" cy="0" r="8" fill="none" stroke="var(--gold)" stroke-width="1"/>
                            </g>

                            <text x="300" y="280" text-anchor="middle" class="centro-texto-ano">ANO</text>
                            <text x="300" y="300" text-anchor="middle" class="centro-texto-liturgico">LITÚRGICO</text>
                            <text x="300" y="325" text-anchor="middle" class="centro-texto-extra">ECCLESIA</text>
                        </g>
                    </svg>
                </div>
                <p class="roda-instrucao">Selecione um tempo para contemplar suas semanas</p>
            </div>
        </section>

        <section class="conteudo-detalhes">
            <div class="container">
                <div id="sec-label" class="sec-label">Semanas do Tempo</div>
                
                <div id="tempo-header" class="tempo-header">
                    <div id="tempo-badge-el" class="tempo-badge"></div>
                    <p id="tempo-desc-el" class="tempo-desc"></p>
                </div>

                <div id="semanas-container" class="semanas-grid"></div>

                <article id="reflexao-painel" class="reflexao-painel">
                    <div id="reflexao-conteudo" class="reflexao-inner">
                        <!-- Conteúdo dinâmico -->
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="rodape">
        <div class="footer-ornamento">❦</div>
        <p>&copy; 2026 &ndash; Lux Fidei</p>
        <p class="footer-motto">Omnia ad maiorem Dei gloriam</p>
    </footer>

    <script src="calendario.js"></script>
</body>
</html>
